<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>المرايا — Al-Miraya</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background: linear-gradient(135deg, #0d0f1a, #111827, #0a0d16);
    min-height: 100vh;
    color: #e8eaf0;
    direction: rtl;
  }
  .container { max-width: 860px; margin: 0 auto; padding: 40px 20px; }
  .header { text-align: center; margin-bottom: 36px; }
  .header .emoji { font-size: 52px; margin-bottom: 8px; display: block; }
  .header h1 {
    font-size: 38px; font-weight: 800;
    background: linear-gradient(135deg, #fff, #a0b4d0);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }
  .header p { color: #6b7a99; font-size: 15px; margin-bottom: 10px; }
  .badge {
    font-size: 12px; color: #3d4a5c;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 20px; padding: 4px 12px;
    display: inline-block;
  }
  .card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px; padding: 26px;
    margin-bottom: 24px;
  }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
  .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .grid2x { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
  label { display: block; color: #8a9bb5; font-size: 12px; margin-bottom: 7px; font-weight: 600; }
  input, textarea {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px; padding: 11px 14px;
    color: #e8eaf0; font-size: 14px;
    font-family: inherit;
  }
  input:focus, textarea:focus { outline: none; border-color: rgba(100,140,220,0.5); }
  input::placeholder, textarea::placeholder { color: #2d3748; }
  textarea { resize: vertical; line-height: 1.7; }
  .counts-box {
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 12px; padding: 16px;
    margin-bottom: 20px;
  }
  .counts-box > p { color: #8a9bb5; font-size: 12px; font-weight: 600; margin-bottom: 12px; }
  .counts-box span { color: #3d4a5c; font-weight: 400; }
  .btn {
    width: 100%; padding: 15px;
    background: linear-gradient(135deg, #2d7dd2, #1a5fa8);
    border: none; border-radius: 12px;
    color: #fff; font-size: 16px; font-weight: 700;
    cursor: pointer; font-family: inherit;
    transition: opacity 0.2s;
  }
  .btn:hover { opacity: 0.88; }
  .btn:disabled { background: rgba(255,255,255,0.04); color: #4a5568; cursor: not-allowed; }
  .error {
    background: rgba(220,80,80,0.1);
    border: 1px solid rgba(220,80,80,0.3);
    border-radius: 10px; padding: 12px 16px;
    margin-bottom: 14px; color: #e07b7b; font-size: 14px;
  }
  .tabs { display: flex; gap: 8px; margin-bottom: 18px; justify-content: center; flex-wrap: wrap; }
  .tab {
    padding: 9px 16px; border-radius: 50px;
    border: 1px solid rgba(255,255,255,0.07);
    background: rgba(255,255,255,0.03);
    color: #6b7a99; font-size: 12px;
    cursor: pointer; font-family: inherit;
    transition: all 0.2s;
  }
  .result-card {
    background: rgba(255,255,255,0.03);
    border-radius: 20px; padding: 26px;
    animation: slideUp 0.3s ease;
  }
  .result-header { display: flex; align-items: center; gap: 14px; margin-bottom: 22px; }
  .result-icon {
    width: 50px; height: 50px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; flex-shrink: 0;
  }
  .section {
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px; padding: 18px;
    margin-bottom: 14px;
  }
  .section-head { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; font-size: 16px; }
  .section-head span.title { font-weight: 700; font-size: 14px; }
  .section p { color: #c8d0e0; line-height: 1.9; font-size: 15px; }
  .q-item { display: flex; gap: 10px; margin-bottom: 8px; }
  .q-num {
    min-width: 22px; height: 22px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; flex-shrink: 0; margin-top: 2px;
  }
  .q-text { color: #c8d0e0; line-height: 1.7; font-size: 15px; }
  .footer { text-align: center; color: #2d3748; font-size: 12px; margin-top: 20px; }
  .spinner { display: inline-block; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .hidden { display: none; }
  #results { animation: fadeIn 0.4s ease; }
  input[type=number]::-webkit-inner-spin-button { opacity: 0.3; }
  @media (max-width: 600px) {
    .grid2 { grid-template-columns: 1fr; }
    .grid3 { grid-template-columns: 1fr 1fr; }
    .header h1 { font-size: 28px; }
  }
</style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <span class="emoji">🪞</span>
    <h1>المرايا — Al-Miraya</h1>
    <p>استشرف درسك من خلال عيون طلابك قبل دخول الفصل</p>
    <span class="badge">🌐 تعمل بالعربي والإنجليزي</span>
  </div>

  <!-- Form -->
  <div class="card">
    <div class="grid2">
      <div>
        <label>المادة / Subject</label>
        <input id="subject" placeholder="عربي، Math..." />
      </div>
      <div>
        <label>الصف / Grade</label>
        <input id="grade" placeholder="الأول، Grade 5" />
      </div>
    </div>

    <div style="margin-bottom:14px">
      <label>الموضوع / Topic</label>
      <input id="topic" placeholder="حرف الباء، Fractions..." />
    </div>

    <div style="margin-bottom:20px">
      <label>خطة الدرس / Lesson Plan</label>
      <textarea id="plan" rows="4" placeholder="اكتب ملخص شرحك أو الخطوات التي ستتبعها في الحصة..."></textarea>
    </div>

    <div class="counts-box">
      <p>عدد الطلاب <span>(اختياري)</span></p>
      <div class="grid3">
        <div>
          <label style="color:#a0b4d0">📘 متوسط</label>
          <input type="number" id="cAvg" placeholder="0" style="text-align:center" />
        </div>
        <div>
          <label style="color:#54c4a0">⚡ متميز</label>
          <input type="number" id="cAdv" placeholder="0" style="text-align:center" />
        </div>
        <div>
          <label style="color:#e07b54">🌱 ضعيف أكاديمياً</label>
          <input type="number" id="cWeak" placeholder="0" style="text-align:center" />
        </div>
      </div>
      <div class="grid2x">
        <div>
          <label style="color:#e0c454">🗣️ ضعيف لغوياً</label>
          <input type="number" id="cLang" placeholder="0" style="text-align:center" />
        </div>
        <div>
          <label style="color:#7b8ce0">🌀 تشتت انتباه</label>
          <input type="number" id="cDist" placeholder="0" style="text-align:center" />
        </div>
      </div>
    </div>

    <div id="error" class="error hidden"></div>

    <button class="btn" id="btn" onclick="analyze()">🪞 انعكس في المرايا</button>
  </div>

  <!-- Results -->
  <div id="results" class="hidden">
    <div class="tabs" id="tabs"></div>
    <div id="resultCard"></div>
    <div class="footer">© Mona Eraky — المرايا | جميع الحقوق محفوظة</div>
  </div>

</div>

<script>
const personas = [
  { id: "average",     label: "المتوسط",          emoji: "📘", color: "#a0b4d0", glow: "rgba(160,180,208,0.25)", border: "rgba(160,180,208,0.4)", desc: "أداؤه مقبول ويحتاج تعزيزاً" },
  { id: "advanced",    label: "المتميز",           emoji: "⚡", color: "#54c4a0", glow: "rgba(84,196,160,0.25)",  border: "rgba(84,196,160,0.4)",  desc: "سريع الفهم ويحتاج تحدياً" },
  { id: "weak",        label: "الضعيف أكاديمياً",  emoji: "🌱", color: "#e07b54", glow: "rgba(224,123,84,0.25)", border: "rgba(224,123,84,0.4)",  desc: "يعاني في استيعاب المفاهيم" },
  { id: "language",    label: "الضعيف لغوياً",     emoji: "🗣️", color: "#e0c454", glow: "rgba(224,196,84,0.25)", border: "rgba(224,196,84,0.4)",  desc: "يفهم لكن يصعب عليه التعبير" },
  { id: "distracted",  label: "تشتت الانتباه",     emoji: "🌀", color: "#7b8ce0", glow: "rgba(123,140,224,0.25)",border: "rgba(123,140,224,0.4)", desc: "صعب يركز لفترة طويلة" },
];

let results = null;
let activeId = "average";
let elapsed = 0;
let timer = null;

function getCounts() {
  return {
    average:   document.getElementById("cAvg").value,
    advanced:  document.getElementById("cAdv").value,
    weak:      document.getElementById("cWeak").value,
    language:  document.getElementById("cLang").value,
    distracted:document.getElementById("cDist").value,
  };
}

function showError(msg) {
  const el = document.getElementById("error");
  el.textContent = "⚠️ " + msg;
  el.classList.remove("hidden");
}
function hideError() { document.getElementById("error").classList.add("hidden"); }

function setLoading(on) {
  const btn = document.getElementById("btn");
  if (on) {
    elapsed = 0;
    timer = setInterval(() => { elapsed++; btn.innerHTML = `<span class="spinner">⟳</span> جاري التحليل... ${elapsed}s`; }, 1000);
    btn.disabled = true;
    btn.innerHTML = `<span class="spinner">⟳</span> جاري التحليل... 0s`;
  } else {
    clearInterval(timer);
    btn.disabled = false;
    btn.innerHTML = "🪞 انعكس في المرايا";
  }
}

function hexToRgb(hex) { return [1,3,5].map(i => parseInt(hex.slice(i,i+2),16)).join(","); }

function renderCard(id) {
  activeId = id;
  const p = personas.find(x => x.id === id);
  const r = results[id];
  const counts = getCounts();

  document.querySelectorAll(".tab").forEach(t => {
    const tid = t.dataset.id;
    const tp = personas.find(x => x.id === tid);
    if (tid === id) {
      t.style.border = `1px solid ${tp.border}`;
      t.style.background = `rgba(${hexToRgb(tp.color)},0.15)`;
      t.style.color = tp.color;
      t.style.fontWeight = "700";
      t.style.boxShadow = `0 0 14px rgba(${hexToRgb(tp.color)},0.2)`;
    } else {
      t.style.border = "1px solid rgba(255,255,255,0.07)";
      t.style.background = "rgba(255,255,255,0.03)";
      t.style.color = "#6b7a99";
      t.style.fontWeight = "400";
      t.style.boxShadow = "none";
    }
  });

  const countBadge = counts[id] ? `<span style="font-size:13px;font-weight:400;color:#6b7a99;margin-right:8px">— ${counts[id]} طلاب</span>` : "";

  document.getElementById("resultCard").innerHTML = `
    <div class="result-card" style="border:1px solid ${p.border};box-shadow:0 0 36px ${p.glow}">
      <div class="result-header">
        <div class="result-icon" style="background:${p.glow};border:2px solid ${p.border}">${p.emoji}</div>
        <div>
          <h2 style="font-size:19px;font-weight:800;color:${p.color}">${p.label}${countBadge}</h2>
          <p style="color:#6b7a99;font-size:12px">${p.desc}</p>
        </div>
      </div>
      <div class="section">
        <div class="section-head"><span>🔍</span><span class="title" style="color:${p.color}">أين سيضيع؟</span></div>
        <p>${r.confusion}</p>
      </div>
      <div class="section">
        <div class="section-head"><span>💬</span><span class="title" style="color:${p.color}">الأسئلة المتوقعة</span></div>
        ${r.questions.map((q,i) => `<div class="q-item"><div class="q-num" style="background:${p.glow};border:1px solid ${p.border};color:${p.color}">${i+1}</div><div class="q-text">${q}</div></div>`).join("")}
      </div>
      <div class="section" style="background:${p.glow}">
        <div class="section-head"><span>🛎</span><span class="title" style="color:${p.color}">التدخل المطلوب منك</span></div>
        <p style="color:#e8eaf0;font-weight:500">${r.intervention}</p>
      </div>
    </div>`;
}

function renderTabs() {
  const counts = getCounts();
  document.getElementById("tabs").innerHTML = personas.map(p => `
    <button class="tab" data-id="${p.id}" onclick="renderCard('${p.id}')">
      ${p.emoji} ${p.label} ${counts[p.id] ? `<span style="opacity:0.6">(${counts[p.id]})</span>` : ""}
    </button>`).join("");
}

async function analyze() {
  const subject = document.getElementById("subject").value.trim();
  const grade   = document.getElementById("grade").value.trim();
  const topic   = document.getElementById("topic").value.trim();
  const plan    = document.getElementById("plan").value.trim();
  const counts  = getCounts();

  if (!subject || !grade || !topic || !plan) { showError("من فضلك أكمل جميع الحقول"); return; }
  hideError(); setLoading(true);
  document.getElementById("results").classList.add("hidden");

  const countsText = [
    counts.average   ? `متوسط: ${counts.average}`        : "",
    counts.advanced  ? `متميز: ${counts.advanced}`        : "",
    counts.weak      ? `ضعيف أكاديمياً: ${counts.weak}`  : "",
    counts.language  ? `ضعيف لغوياً: ${counts.language}` : "",
    counts.distracted? `تشتت انتباه: ${counts.distracted}`: "",
  ].filter(Boolean).join(" | ");

  const prompt = `You are an expert teacher trainer. Analyze this lesson for 5 student types. Return ONLY a JSON object, no markdown, no extra text.

Subject: ${subject}
Grade: ${grade}
Topic: ${topic}
Lesson: ${plan}
${countsText ? `Student counts: ${countsText}` : ""}

Use the same language as the lesson content. Return ONLY this JSON:
{"average":{"confusion":"2 sentences","questions":["q1","q2","q3"],"intervention":"1 sentence"},"advanced":{"confusion":"2 sentences","questions":["q1","q2","q3"],"intervention":"1 sentence"},"weak":{"confusion":"2 sentences","questions":["q1","q2","q3"],"intervention":"1 sentence"},"language":{"confusion":"2 sentences","questions":["q1","q2","q3"],"intervention":"1 sentence"},"distracted":{"confusion":"2 sentences","questions":["q1","q2","q3"],"intervention":"1 sentence"}}`;

  try {
    const res = await fetch("/api/analyze", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ prompt }),
    });

    if (!res.ok) { const e = await res.json().catch(()=>({})); showError(`خطأ ${res.status}: ${e?.error||"حاول مجدداً"}`); return; }

    const data = await res.json();
    const text = data.text || "";
    const match = text.match(/\{[\s\S]*\}/);
    if (!match) { showError("الرد غير متوقع، حاول مجدداً"); return; }

    let parsed;
    try { parsed = JSON.parse(match[0]); }
    catch { const fixed = match[0].replace(/,(\s*[}\]])/g,"$1"); try { parsed=JSON.parse(fixed); } catch { showError("تعذر قراءة الرد، حاول مجدداً"); return; } }

    if (!parsed?.average || !parsed?.advanced || !parsed?.weak || !parsed?.language || !parsed?.distracted) {
      showError("بيانات ناقصة، حاول مجدداً"); return;
    }

    results = parsed;
    renderTabs();
    renderCard("average");
    document.getElementById("results").classList.remove("hidden");

  } catch(e) { showError(`خطأ في الاتصال: ${e.message}`); }
  finally { setLoading(false); }
}
</script>
</body>
</html>
